<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do Planner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
      background: url('https://images.unsplash.com/photo-1508780709619-79562169bc64') center/cover no-repeat;
      background-size: cover;
      transition: 0.3s;
    }

    body.dark {
      background: #0f172a;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: rgba(255, 255, 255, 0.95);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }

    body.dark .container {
      background: #1e293b;
      color: white;
    }

    h1 {
      text-align: center;
      font-size: 32px;
      margin-bottom: 20px;
    }

    .top {
      display: grid;
      grid-template-columns: 1fr 120px 120px 100px 100px;
      gap: 10px;
      margin-bottom: 15px;
    }

    .top input,
    .top select,
    .top button {
      padding: 12px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    body.dark .top input,
    body.dark .top select {
      background: #334155;
      color: white;
      border: 1px solid #555;
    }

    .top button {
      background: #3498db;
      color: white;
      border: none;
      cursor: pointer;
    }

    .top button:hover {
      background: #1e6fc1;
    }

    .sections {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 15px;
    }

    .section {
      background: #f3f3f3;
      padding: 15px;
      border-radius: 8px;
    }

    body.dark .section {
      background: #334155;
      color: white;
    }

    .section h2 {
      margin-bottom: 10px;
    }

    ul {
      list-style: none;
    }

    li {
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #eee;
      cursor: grab;
    }

    body.dark li {
      background: #475569;
      color: white;
    }

    li span {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .task-info {
      display: flex;
      flex-direction: column;
    }

    .task-date {
      font-size: 14px;
      opacity: 0.7;
    }

    .priority-high {
      border-left: 6px solid #e74c3c;
      padding-left: 6px;
    }

    .priority-medium {
      border-left: 6px solid #f39c12;
      padding-left: 6px;
    }

    .priority-low {
      border-left: 6px solid #27ae60;
      padding-left: 6px;
    }

    .actions button {
      margin-left: 5px;
      font-size: 12px;
      padding: 5px 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .complete {
      background: #27ae60;
      color: white;
    }

    .edit {
      background: #f39c12;
      color: white;
    }

    .delete {
      background: #e74c3c;
      color: white;
    }

    .progress-box {
      margin: 15px 0;
    }

    .progress-bar {
      height: 20px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
    }

    body.dark .progress-bar {
      background: #334155;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #27ae60;
      transition: 0.3s;
    }

    .stats {
      text-align: center;
      margin-top: 5px;
      font-size: 14px;
    }

    .category-title {
      font-weight: bold;
      margin-top: 10px;
      margin-bottom: 5px;
      font-size: 16px;
    }

    .badge {
      padding: 2px 6px;
      border-radius: 4px;
      color: white;
      font-size: 12px;
      font-weight: bold;
    }

    .badge-study {
      background: #e74c3c;
    }

    .badge-personal {
      background: #f39c12;
    }

    .badge-routine {
      background: #27ae60;
    }

    @media(max-width:700px) {
      h1 {
        font-size: 28px;
      }

      .top {
        grid-template-columns: 1fr 90px 90px 90px 90px;
      }

      .top input,
      .top select,
      .top button {
        font-size: 14px;
        padding: 10px;
      }

      li {
        font-size: 14px;
        padding: 10px;
      }

      .actions button {
        font-size: 12px;
        padding: 4px 6px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Professional To-Do Planner</h1>

    <div class="top">
      <input type="text" id="taskInput" placeholder="Enter new task">
      <input type="date" id="taskDate">
      <select id="priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
      <select id="category">
        <option value="study">Study</option>
        <option value="personal">Personal</option>
        <option value="routine">Daily Routine</option>
      </select>
      <button onclick="addTask()">Add</button>
    </div>

    <div class="progress-box">
      <div class="progress-bar">
        <div class="progress" id="progress"></div>
      </div>
      <div class="stats" id="stats"></div>
    </div>

    <div class="sections">
      <div class="section">
        <h2>Pending Tasks</h2>
        <div id="studyList"></div>
        <div id="personalList"></div>
        <div id="routineList"></div>
      </div>
      <div class="section">
        <h2>Completed Tasks</h2>
        <ul id="completedList"></ul>
      </div>
    </div>

    <button style="margin-top:15px;" onclick="toggleDark()">🌙 Dark Mode</button>
  </div>

  <script>
    let exampleTasks = [
      { text: "Read 50 pages of textbook", date: "2026-03-10", priority: "high", category: "study", completed: false },
      { text: "Complete math assignment", date: "2026-03-11", priority: "medium", category: "study", completed: false },
      { text: "Morning jogging", date: "2026-03-10", priority: "low", category: "routine", completed: false },
      { text: "Prepare breakfast", date: "2026-03-10", priority: "low", category: "routine", completed: false },
      { text: "Call parents", date: "2026-03-10", priority: "medium", category: "personal", completed: false },
      { text: "Organize workspace", date: "2026-03-11", priority: "low", category: "personal", completed: false },
      { text: "Attend online lecture", date: "2026-03-11", priority: "high", category: "study", completed: false },
      { text: "Evening meditation", date: "2026-03-10", priority: "medium", category: "routine", completed: false }
    ];

    let tasks = JSON.parse(localStorage.getItem("tasks")) || exampleTasks;

    function saveTasks() { localStorage.setItem("tasks", JSON.stringify(tasks)); }
    function addTask() {
      const text = document.getElementById("taskInput").value.trim();
      const date = document.getElementById("taskDate").value;
      const priority = document.getElementById("priority").value;
      const category = document.getElementById("category").value;
      if (!text) { alert("Enter a task"); return; }
      tasks.push({ text, date, priority, category, completed: false });
      document.getElementById("taskInput").value = "";
      document.getElementById("taskDate").value = "";
      saveTasks(); renderTasks();
    }

    function renderTasks() {
      document.getElementById("studyList").innerHTML = "";
      document.getElementById("personalList").innerHTML = "";
      document.getElementById("routineList").innerHTML = "";
      document.getElementById("completedList").innerHTML = "";

      const categories = [
        { id: "studyList", name: "STUDY", key: "study" },
        { id: "personalList", name: "PERSONAL", key: "personal" },
        { id: "routineList", name: "DAILY ROUTINE", key: "routine" }
      ];

      categories.forEach(cat => {
        const catTasks = tasks.filter(t => !t.completed && t.category === cat.key);
        if (catTasks.length > 0) {
          const div = document.getElementById(cat.id);
          const title = document.createElement("div");
          title.className = "category-title";
          title.innerText = cat.name;
          div.appendChild(title);
          const ul = document.createElement("ul");
          catTasks.forEach(task => {
            ul.appendChild(createTaskElement(task, tasks.indexOf(task)));
          });
          div.appendChild(ul);
        }
      });

      tasks.filter(t => t.completed).forEach(task => {
        document.getElementById("completedList").appendChild(createTaskElement(task, tasks.indexOf(task)));
      });

      updateProgress();
    }

    function createTaskElement(task, index) {
      const li = document.createElement("li");
      li.className = "priority-" + task.priority;
      li.setAttribute("draggable", "true");

      // Badge HTML
      let badgeClass = task.category === "study" ? "badge-study" : task.category === "personal" ? "badge-personal" : "badge-routine";
      const badge = `<span class="badge ${badgeClass}">${task.category.toUpperCase()}</span>`;

      li.innerHTML = `
    <div class="task-info">
      <span>${badge} ${task.text}</span>
      <div class="task-date">Due: ${task.date || "No date"}</div>
    </div>
    <div class="actions">
      <button class="complete">${task.completed ? "Mark Pending" : "Complete"}</button>
      <button class="edit">Edit</button>
      <button class="delete">Delete</button>
    </div>
  `;

      li.querySelector(".complete").addEventListener("click", () => {
        tasks[index].completed = !tasks[index].completed;
        saveTasks(); renderTasks();
      });
      li.querySelector(".edit").addEventListener("click", () => {
        const newText = prompt("Edit Task", task.text);
        if (newText) { tasks[index].text = newText.trim(); saveTasks(); renderTasks(); }
      });
      li.querySelector(".delete").addEventListener("click", () => {
        tasks.splice(index, 1); saveTasks(); renderTasks();
      });

      li.addEventListener("dragstart", (e) => { e.dataTransfer.setData("index", index); });
      li.addEventListener("dragover", (e) => e.preventDefault());
      li.addEventListener("drop", (e) => {
        const fromIndex = e.dataTransfer.getData("index");
        if (fromIndex === "") return;
        tasks.splice(index, 0, tasks.splice(fromIndex, 1)[0]);
        saveTasks(); renderTasks();
      });

      return li;
    }

    function updateProgress() {
      const completed = tasks.filter(t => t.completed).length;
      const total = tasks.length;
      const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
      document.getElementById("progress").style.width = percent + "%";
      document.getElementById("stats").innerText = `Completed: ${completed} | Pending: ${total - completed} | Progress: ${percent}%`;
    }

    function toggleDark() { document.body.classList.toggle("dark"); }
    renderTasks();
  </script>
</body>

</html>
